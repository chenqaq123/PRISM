const data = {
  nodes: new vis.DataSet(nodesData),
  edges: new vis.DataSet(edgesData),
};
const options = {
  physics: {
    enabled: true,
    solver: 'forceAtlas2Based',
    forceAtlas2Based: { gravitationalConstant: -60, springLength: 120, springConstant: 0.08 },
    stabilization: { iterations: 250 },
  },
  interaction: { hover: true, tooltipDelay: 100, navigationButtons: true, keyboard: true },
  edges: { font: { align: 'middle' }, selectionWidth: 2 },
};
const network = new vis.Network(container, data, options);

let physicsOn = true;
function togglePhysics() {
  physicsOn = !physicsOn;
  network.setOptions({ physics: { enabled: physicsOn } });
}

// Node click → detail panel
const nodeMap = Object.fromEntries(nodesData.map(n => [n.id, n]));
network.on('click', params => {
  if (!params.nodes.length) return;
  const n = nodeMap[params.nodes[0]];
  if (!n) return;
  document.getElementById('node-detail').innerHTML =
    (n.title || '').replace(/<br>/g, '\n')
      .replace(/<[^>]+>/g, '')
      .split('\n')
      .map(l => `<div>${l}</div>`)
      .join('');
});
